{% load djicons i18n %}
<div data-back-url="{% url 'inventory:products_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Product" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'inventory:products_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-product-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content">
                <span class="callout-text">{{ error }}</span>
            </div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-product-form"
          hx-post="{% url 'inventory:product_add' %}"
          hx-encoding="multipart/form-data">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <!-- Name -->
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full"
                placeholder="{% trans 'Product name' %}" required>
                </div>

                <!-- SKU -->
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "SKU" %}</label>
                <input type="text" name="sku" class="input input-sm w-full"
                placeholder="{% trans 'SKU code' %}" required>
                </div>

                <!-- Type -->
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Type" %}</label>
                <select name="product_type" class="select select-sm w-full">
                <option value="physical">{% trans "Physical Product" %}</option>
                <option value="service">{% trans "Service" %}</option>
                </select>
                </div>

                <!-- Price & Cost -->
                <div class="grid grid-cols-2 gap-3">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Price" %}</label>
                <input type="number" name="price" class="input input-sm w-full"
                step="0.01" min="0" placeholder="0.00" required>
                </div>
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Cost" %}</label>
                <input type="number" name="cost" class="input input-sm w-full"
                step="0.01" min="0" placeholder="0.00" value="0">
                </div>
                </div>

                <!-- Stock & Threshold -->
                <div class="grid grid-cols-2 gap-3">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Stock" %}</label>
                <input type="number" name="stock" class="input input-sm w-full"
                min="0" placeholder="0" value="0">
                </div>
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Low Stock" %}</label>
                <input type="number" name="low_stock_threshold" class="input input-sm w-full"
                min="0" placeholder="10" value="10">
                </div>
                </div>

                <!-- EAN-13 -->
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "EAN-13" %}</label>
                <input type="text" name="ean13" class="input input-sm w-full"
                placeholder="{% trans 'Optional barcode' %}" maxlength="13">
                </div>

                <!-- Categories -->
                <div x-data="{ open: false, selected: [], labels: {} }" x-init="
                    {% for cat in categories_list %}labels['{{ cat.id }}'] = '{{ cat.name }}';{% endfor %}
                ">
                <label class="text-sm font-medium mb-1 block">{% trans "Categories" %}</label>
                <button type="button" class="select-modal select-modal-sm w-full" @click="open = true">
                    <span class="select-modal-placeholder" x-show="selected.length === 0">{% trans "Select categories..." %}</span>
                    <span class="select-modal-tags" x-show="selected.length > 0">
                        <template x-for="id in selected" :key="id">
                            <span class="select-modal-tag">
                                <span x-text="labels[id]"></span>
                                <span class="select-modal-tag-remove" @click.stop="selected = selected.filter(t => t !== id)">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                </span>
                            </span>
                        </template>
                    </span>
                </button>
                <template x-for="id in selected" :key="id">
                    <input type="hidden" name="categories" :value="id">
                </template>
                <div class="modal-backdrop" :data-state="open ? 'open' : 'closed'" @click.self="open = false">
                    <div class="modal modal-sm">
                        <div class="modal-header">
                            <h3 class="modal-title">{% trans "Categories" %}</h3>
                            <button type="button" class="modal-close" @click="open = false">&times;</button>
                        </div>
                        <div class="modal-body p-0">
                            {% for cat in categories_list %}
                            <label class="select-modal-option" :class="selected.includes('{{ cat.id }}') && 'select-modal-option-selected'">
                                <input type="checkbox" class="checkbox-input" value="{{ cat.id }}" x-model="selected">
                                <span class="checkbox-box"><svg class="checkbox-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
                                <span class="select-modal-option-label">{{ cat.name }}</span>
                            </label>
                            {% endfor %}
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-ghost btn-sm" @click="selected = []; open = false">{% trans "Clear" %}</button>
                            <button type="button" class="btn btn-sm color-primary" @click="open = false">{% trans "Done" %}</button>
                        </div>
                    </div>
                </div>
                </div>

                <!-- Tax Class -->
                {% if tax_classes %}
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Tax Class" %}</label>
                <select name="tax_class" class="select select-sm w-full">
                <option value="">{% trans "Default" %}</option>
                {% for tc in tax_classes %}
                <option value="{{ tc.id }}">{{ tc.name }} ({{ tc.rate }}%)</option>
                {% endfor %}
                </select>
                </div>
                {% endif %}

                <!-- Allergens (EU RD 126/2015) -->
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Allergens" %}</label>
                <div class="flex flex-wrap gap-3">
                    {% for code, label in allergen_choices %}
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" name="allergens" value="{{ code }}" class="checkbox-input">
                        <span class="checkbox-box"><svg class="checkbox-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
                        {{ label }}
                    </label>
                    {% endfor %}
                </div>
                </div>

                <!-- Description -->
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
                <textarea name="description" class="textarea textarea-sm w-full" rows="3"
                placeholder="{% trans 'Product description' %}"></textarea>
                </div>

                <!-- Image -->
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Image" %}</label>
                <input type="file" name="image" accept="image/*" class="input input-sm w-full">
                </div>
            </div>
        </div>
    </form>
</div>
